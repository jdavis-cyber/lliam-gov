security:
  posture: strict
  tirith_enabled: true
  tirith_fail_open: false
  allow_private_urls: false
  allow_lazy_installs: false
  redact_secrets: true
  deny_on_no_approver: true
  posture_findings_blocking: true
  skill_policy:
    mode: enforce
    unlisted_disposition: log
    path: policy/skills-allowlist.yaml
    constrain_mobile_code: true
  require_signed_skills: true
  require_ast_audit: true
  require_provenance: true
  skill_allowlist:
  - name: pdf
    source: builtin
  - name: xlsx
    source: builtin
  - name: docx
    source: builtin
  tool_risk_policy:
    enabled: true
    policy_path: policy/tool-risk-policy.yaml
    default_disposition: deny
    fail_closed: true
  tool_allowlist: []
  tool_denylist:
  - computer_use
  - browser
  schema_validation:
    mode: reject
    max_schema_bytes: 65536
  input_trust:
    enabled: true
    policy_path: policy/input-trust-policy.yaml
    untrusted_sources:
    - web
    - file
    - tool_result
    - mcp
    - rag
    sanitize: true
    delimit_untrusted: true
  smart_approval_guard:
    hardened: true
    out_of_scope_disposition: approve
  inbound_screening:
    enabled: true
    mode: log
  memory_poisoning_defense:
    enabled: true
    mode: block
    scope: strict
  path_traversal_validation:
    enabled: true
    fail_closed: true
  require_hashed_install: true
  supply_chain:
    pinned_lockfile: uv.lock
    lockfile_hash_algo: sha256
    require_upper_bounds: true
    change_record: docs/governance/change-record.md
    osv_fail_on: high
privacy:
  redact_pii: true
memory:
  write_approval: true
skills:
  write_approval: true
  guard_agent_created: true
  inline_shell: false
  disabled:
  - obliteratus
  - web-pentest
  - sherlock
  - oss-forensics
  deny_tags:
  - jailbreak
  - uncensoring
  - safety-bypass
  - refusal-removal
  - abliteration
  - guardrail-removal
  - prompt-injection-offense
terminal:
  backend: docker
  timeout: 180
agent:
  disabled_toolsets:
  - computer_use
  - browser
