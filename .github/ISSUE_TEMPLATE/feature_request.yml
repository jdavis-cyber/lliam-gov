name: Feature request
description: Suggest an improvement to Lliam-GOV
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Lliam-GOV is a governed, controlled fork — changes are made by
        arrangement. Please describe the problem first; agreement on approach
        comes before implementation. See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's getting in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you like Lliam-GOV to do? Note if it touches the governance core (audit log, encryption, egress allow-list, capability/self-modification gates).
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
