name: Bug report
description: Report a problem with Lliam-GOV
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I confirmed this is not a security vulnerability (those go through private reporting).
          required: true
        - label: I'm on the latest `main` and the bug still reproduces.
          required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `uv run lliam-gov ...`
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `uv run lliam-gov version`.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS + version, Python version, install method (governed install / uv sync).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant error output. Redact any secrets or controlled information.
      render: shell
