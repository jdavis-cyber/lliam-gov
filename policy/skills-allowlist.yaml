policy:
  mode: enforce
  unlisted_disposition: log
  fail_closed: true
  applies_to_posture: strict
  review_cadence_days: 90
  codeowners_required: true
skills:
  disabled:
  - obliteratus
  - web-pentest
  - sherlock
  - oss-forensics
  guard_agent_created: true
  inline_shell: false
  write_approval: true
  deny_tags:
  - jailbreak
  - uncensoring
  - safety-bypass
  - refusal-removal
  - abliteration
  - guardrail-removal
  - prompt-injection-offense
security:
  skill_allowlist:
  - name: pdf
    source: builtin
    ast_audit: pass
    provenance: foreground
    attestation: builtin
  - name: xlsx
    source: builtin
    ast_audit: pass
    provenance: foreground
    attestation: builtin
  - name: docx
    source: builtin
    ast_audit: pass
    provenance: foreground
    attestation: builtin
  plugin_allowlist:
  - name: security-guidance
    source: builtin
    sdl_scan: pass
  plugin_denylist: []
  require_signed_skills: true
  require_ast_audit: true
  require_provenance: true
  trusted_signers:
  - gov-skill-signing-authority
  unsigned_disposition: hold
sdl_gate:
  require_provenance: true
  require_ast_audit: true
  require_guard_scan: true
  require_security_guidance_scan: true
  require_osv_scan: true
  osv_fail_on: high
  require_codeowners: true
  sdl_record_dir: docs/governance/sdl
exceptions:
  register: docs/governance/deviation-register.yaml
  never_eligible:
  - obliteratus
ci_assertions:
  assert_disabled:
  - godmode
  - obliteratus
  - web-pentest
  - sherlock
  - oss-forensics
  assert_pinned:
    skills.guard_agent_created: true
    skills.inline_shell: false
    skills.write_approval: true
    security.require_signed_skills: true
    policy.mode: enforce
    policy.fail_closed: true
